<body>
    <h2>k. Elaborar um programa que efetue a leitura de um determinado valor inteiro, e efetue a sua apresentação, caso o valor não seja maior que três.</h2>

    <script>

        var numero = parseInt(prompt('Digite um número inteiro:'))

        if (numero <= 3) {
            alert(numero)
        }

    </script>
