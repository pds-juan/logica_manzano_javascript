<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> L02A - Manzano pág. 41 </title>
</head>

<body>
    <h2>a. Ler dois valores numéricos inteiros e apresentar o resultado da diferença do maior pelo menor valor.</h2>

    <script>

        var A = parseInt(prompt('Digite o primeiro valor:'))
        var B = parseInt(prompt('Digite o segundo valor:'))

        if (A > B) {
            alert('A diferença entra A e B é ' + (A - B) + '.')
        } else if (B > A) {
            alert('A diferença entra B e A é ' + (B - A) + '.')
        } else {
            alert('Os números são iguais.')
        }

    </script>
</body>

</html>
