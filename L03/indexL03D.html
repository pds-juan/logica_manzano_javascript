<body>
    <h2>d) Apresentar todos os valores numéricos inteiros ímpares situados na faixa de 0 a 20. Para verificar se o número é ímpar, efetuar dentro da malha a verificação lógica desta condição com a instrução se, perguntando se o número é ímpar; sendo, mostre-o; não sendo, passe para o próximo passo.</h2>

    <script>

        var contador = 1

        while (contador <= 20) {
            if (contador % 2 != 0) {
                alert(contador+' é um número ímpar.')
            }
            contador++
        }

    </script>
</body>
