<body>
    <h2>a) Apresentar os quadrados dos números inteiros de 15 a 200.</h2>

    <script>

        var numero = 15

        do {
            alert('O quadrado de '+numero+' é '+(numero*numero)+'.')
            numero++
        } while (numero <= 200);

    </script>
</body>
